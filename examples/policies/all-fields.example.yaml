version: v1
rules:
  - id: allow-process-exec-with-all-supported-fields
    action_type: process.exec
    resource: file://workspace/**
    decision: ALLOW
    principals:
      - system
    agents:
      - ProdClaw
    environments:
      - dev
    risk_flags:
      - risk.exec
      - risk.secrets
    exec_match:
      argv_patterns:
        - ["git", "status"]
        - ["go", "test", "**"]
    obligations:
      sandbox_mode: local
      net_allowlist:
        - example.com
        - api.example.com
      http_redirects: false
      http_redirect_hop_limit: 2
      output_max_bytes: 65536
      output_max_lines: 200
      credential_lease_ids:
        - github_token
        - docker_registry_token
  - id: deny-sensitive-http-request
    action_type: net.http_request
    resource: url://api.example.com/**
    decision: DENY
    principals:
      - system
    agents:
      - ProdClaw
    environments:
      - dev
    risk_flags:
      - risk.net
    obligations:
      net_allowlist:
        - api.example.com
      http_redirects: true
      http_redirect_hop_limit: 1
  - id: deny-secret-read
    action_type: fs.read
    resource: secret://prod/**
    decision: DENY
    principals:
      - system
    agents:
      - ProdClaw
    environments:
      - prod
    risk_flags:
      - risk.secrets
