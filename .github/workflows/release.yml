name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build And Publish Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: release
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Resolve Version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME}"
          else
            version="${{ inputs.version }}"
          fi
          if [[ ! "${version}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "version must look like v0.1.0 or v0.1.0-rc.1" >&2
            exit 2
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Checkout Release Ref
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: refs/tags/${{ steps.version.outputs.version }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Vulnerability Scan
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/release-tools"
          GOBIN="${RUNNER_TEMP}/release-tools" go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          "${RUNNER_TEMP}/release-tools/govulncheck" ./...

      - name: Build Release Archives
        shell: bash
        run: |
          set -euo pipefail
          go run ./scripts/release \
            --mode build \
            --version "${{ steps.version.outputs.version }}" \
            --dist dist

      - name: Install Supply-Chain Tools
        shell: bash
        run: |
          set -euo pipefail
          TOOLS_BIN="${RUNNER_TEMP}/release-tools"
          mkdir -p "${TOOLS_BIN}"
          GOBIN="${TOOLS_BIN}" go install github.com/anchore/syft/cmd/syft@v1.24.0
          GOBIN="${TOOLS_BIN}" go install github.com/sigstore/cosign/v2/cmd/cosign@v2.4.1
          echo "TOOLS_BIN=${TOOLS_BIN}" >> "${GITHUB_ENV}"

      - name: Generate SBOM
        shell: bash
        run: |
          set -euo pipefail
          "${TOOLS_BIN}/syft" packages dir:dist -o spdx-json > dist/prodclaw-sbom.spdx.json

      - name: Generate Provenance
        shell: bash
        run: |
          set -euo pipefail
          go run ./scripts/release \
            --mode provenance \
            --version "${{ steps.version.outputs.version }}" \
            --dist dist \
            --repository "${{ github.repository }}" \
            --workflow ".github/workflows/release.yml" \
            --run-id "${{ github.run_id }}" \
            --go-version "$(go env GOVERSION)"

      - name: Sign Release Assets
        shell: bash
        run: |
          set -euo pipefail
          for file in \
            dist/prodclaw-*.tar.gz \
            dist/prodclaw-*.zip \
            dist/prodclaw-checksums.txt \
            dist/prodclaw-sbom.spdx.json \
            dist/prodclaw-provenance.intoto.jsonl; do
            "${TOOLS_BIN}/cosign" sign-blob --yes \
              --output-signature "${file}.sig" \
              --output-certificate "${file}.pem" \
              "${file}"
          done

      - name: Verify Required Trust Artifacts
        shell: bash
        run: |
          set -euo pipefail
          required=(
            prodclaw-linux-amd64.tar.gz
            prodclaw-linux-arm64.tar.gz
            prodclaw-darwin-amd64.tar.gz
            prodclaw-darwin-arm64.tar.gz
            prodclaw-windows-amd64.zip
            prodclaw-windows-arm64.zip
            prodclaw-checksums.txt
            prodclaw-sbom.spdx.json
            prodclaw-provenance.intoto.jsonl
          )
          for asset in "${required[@]}"; do
            test -s "dist/${asset}"
            test -s "dist/${asset}.sig"
            test -s "dist/${asset}.pem"
          done

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2.5.0
        with:
          tag_name: ${{ steps.version.outputs.version }}
          files: dist/*
          generate_release_notes: true

      - name: Update Homebrew And Scoop Manifests
        env:
          PACKAGES_REPO_TOKEN: ${{ secrets.PACKAGES_REPO_TOKEN }}
          HOMEBREW_REPO: safe-agentic-world/homebrew-prodclaw
          SCOOP_REPO: safe-agentic-world/scoop-prodclaw
          RELEASE_TAG: ${{ steps.version.outputs.version }}
          SOURCE_REPOSITORY: ${{ github.repository }}
          CHECKSUM_FILE: ${{ github.workspace }}/dist/prodclaw-checksums.txt
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${PACKAGES_REPO_TOKEN:-}" ]]; then
            echo "::warning::PACKAGES_REPO_TOKEN is not set; skipping Homebrew/Scoop manifest update."
            exit 0
          fi
          if ! bash ./scripts/update-packages-repo.sh; then
            echo "::warning::package repo update failed; release was published, but Homebrew/Scoop manifests were not updated"
          fi
