name: Release

on:
  repository_dispatch:
    types:
      - publish-release
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish (for example v0.1.0)
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.event.client_payload.tag || github.event.inputs.tag || github.ref }}
  cancel-in-progress: false

env:
  GO_VERSION: "1.25.10"

jobs:
  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: release
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Resolve release tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "repository_dispatch" ]]; then
            tag="${{ github.event.client_payload.tag }}"
          else
            tag="${{ github.event.inputs.tag }}"
          fi
          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release tag: ${tag}" >&2
            exit 1
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Checkout tag
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          ref: refs/tags/${{ steps.meta.outputs.tag }}
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v6.3.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Test
        run: go test ./...

      - name: Vulnerability Scan
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/release-tools"
          GOBIN="${RUNNER_TEMP}/release-tools" go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          "${RUNNER_TEMP}/release-tools/govulncheck" ./...

      - name: Build release archives
        shell: bash
        run: |
          set -euo pipefail
          go run ./scripts/release \
            --mode build \
            --version "${{ steps.meta.outputs.tag }}" \
            --dist dist

      - name: Install supply-chain tooling
        shell: bash
        run: |
          set -euo pipefail
          TOOLS_BIN="${RUNNER_TEMP}/release-tools"
          mkdir -p "${TOOLS_BIN}"
          GOBIN="${TOOLS_BIN}" go install github.com/anchore/syft/cmd/syft@v1.24.0
          GOBIN="${TOOLS_BIN}" go install github.com/sigstore/cosign/v2/cmd/cosign@v2.4.1
          echo "TOOLS_BIN=${TOOLS_BIN}" >> "${GITHUB_ENV}"

      - name: Generate SBOM
        shell: bash
        run: |
          set -euo pipefail
          "${TOOLS_BIN}/syft" packages dir:dist -o spdx-json > dist/prodclaw-sbom.spdx.json

      - name: Generate provenance
        shell: bash
        run: |
          set -euo pipefail
          go run ./scripts/release \
            --mode provenance \
            --version "${{ steps.meta.outputs.tag }}" \
            --dist dist \
            --repository "${{ github.repository }}" \
            --workflow ".github/workflows/release.yml" \
            --run-id "${{ github.run_id }}" \
            --go-version "${GO_VERSION}"

      - name: Sign release assets
        shell: bash
        run: |
          set -euo pipefail
          COSIGN_BIN="${TOOLS_BIN}/cosign"
          for file in \
            dist/prodclaw-*.tar.gz \
            dist/prodclaw-*.zip \
            dist/prodclaw-checksums.txt \
            dist/prodclaw-sbom.spdx.json \
            dist/prodclaw-provenance.intoto.jsonl; do
            "${COSIGN_BIN}" sign-blob --yes \
              --output-signature "${file}.sig" \
              --output-certificate "${file}.pem" \
              "${file}"
          done

      - name: Verify required trust artifacts
        shell: bash
        run: |
          set -euo pipefail
          required=(
            prodclaw-linux-amd64.tar.gz
            prodclaw-linux-arm64.tar.gz
            prodclaw-darwin-amd64.tar.gz
            prodclaw-darwin-arm64.tar.gz
            prodclaw-windows-amd64.zip
            prodclaw-windows-arm64.zip
            prodclaw-checksums.txt
            prodclaw-sbom.spdx.json
            prodclaw-provenance.intoto.jsonl
          )
          for asset in "${required[@]}"; do
            test -s "dist/${asset}"
            test -s "dist/${asset}.sig"
            test -s "dist/${asset}.pem"
          done

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2.5.0
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          files: dist/*
          generate_release_notes: true

      - name: Update Homebrew and Scoop manifests
        if: ${{ github.event_name == 'repository_dispatch' }}
        env:
          PACKAGES_REPO_TOKEN: ${{ secrets.prodclaw_packages }}
          HOMEBREW_REPO: safe-agentic-world/homebrew-prodclaw
          SCOOP_REPO: safe-agentic-world/scoop-prodclaw
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
          SOURCE_REPOSITORY: ${{ github.repository }}
          CHECKSUM_FILE: ${{ github.workspace }}/dist/prodclaw-checksums.txt
        shell: bash
        run: |
          set -euo pipefail
          if ! bash ./scripts/update-packages-repo.sh; then
            echo "::warning::package repo update failed; release was published, but Homebrew/Scoop manifests were not updated"
          fi
