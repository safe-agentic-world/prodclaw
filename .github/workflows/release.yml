name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve Version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME}"
          else
            version="${{ inputs.version }}"
          fi
          if [[ ! "${version}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "version must look like v0.1.0 or v0.1.0-rc.1" >&2
            exit 2
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Test
        run: go test ./...

      - name: Build Artifacts
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          mkdir -p dist
          targets=(
            "linux amd64"
            "linux arm64"
            "darwin amd64"
            "darwin arm64"
            "windows amd64"
          )
          for target in "${targets[@]}"; do
            read -r goos goarch <<< "${target}"
            name="prodclaw_${version}_${goos}_${goarch}"
            binary="prodclaw"
            if [[ "${goos}" == "windows" ]]; then
              binary="prodclaw.exe"
            fi
            outdir="dist/${name}"
            mkdir -p "${outdir}"
            GOOS="${goos}" GOARCH="${goarch}" CGO_ENABLED=0 go build \
              -trimpath \
              -ldflags "-s -w -X github.com/safe-agentic-world/prodclaw/internal/version.Version=${version}" \
              -o "${outdir}/${binary}" \
              ./cmd/prodclaw
            cp README.md LICENSE "${outdir}/"
            if [[ "${goos}" == "windows" ]]; then
              (cd dist && zip -qr "${name}.zip" "${name}")
            else
              tar -C dist -czf "dist/${name}.tar.gz" "${name}"
            fi
            rm -rf "${outdir}"
          done
          (cd dist && sha256sum * > checksums.txt)

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          if gh release view "${version}" >/dev/null 2>&1; then
            gh release upload "${version}" dist/* --clobber
          else
            gh release create "${version}" dist/* \
              --title "ProdClaw ${version}" \
              --notes "ProdClaw ${version} release artifacts and SHA256 checksums."
          fi
