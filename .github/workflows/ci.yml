name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Go Build And Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download Modules
        run: go mod download

      - name: Build
        run: go build ./cmd/prodclaw

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Policy Smoke Test
        run: |
          go run ./cmd/prodclaw policy check \
            --profile ci-standard \
            --action examples/actions/git-status.json

      - name: Clean CI CLI Smoke Test
        run: |
          printf 'fix the build\n' > /tmp/prodclaw-task.md
          env -i PATH="$PATH" HOME="$HOME" ./prodclaw version
          env -i PATH="$PATH" HOME="$HOME" ./prodclaw profiles list
          env -i PATH="$PATH" HOME="$HOME" ./prodclaw job run \
            --agent codex \
            --task /tmp/prodclaw-task.md \
            --dry-run
