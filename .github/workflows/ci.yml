name: Enterprise CI

on:
  push:
    branches: ["**"]
    tags:
      - "v*"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GOFLAGS: -mod=readonly
  GO_VERSION: "1.25.10"

jobs:
  test:
    name: Go Build And Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Go
        uses: actions/setup-go@v6.3.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download Modules
        run: go mod download

      - name: Build
        run: go build ./cmd/prodclaw

      - name: Test
        run: go test ./...

      - name: Bypass Fixture Tests
        run: |
          go test ./internal/bypass ./internal/normalize ./internal/mcp \
            -run 'Bypass|NormalizationBypass|Symlink|Redirect'

      - name: Vet
        run: go vet ./...

      - name: Controlled Runtime Direct Curl Fixture
        run: |
          docker build -t prodclaw:bypass .
          mkdir -p artifacts/prodclaw
          docker run --rm --network none --user "$(id -u):$(id -g)" \
            -e PRODCLAW_EGRESS_BLOCKED=true \
            -e PRODCLAW_WORKSPACE_MUTATION_DETECT=true \
            -v "$PWD:/workspace" \
            -v "$PWD/artifacts/prodclaw:/artifacts" \
            prodclaw:bypass \
            doctor --mode container --workspace /workspace --artifact-dir /artifacts
          set +e
          docker run --rm --network none \
            -e PRODCLAW_EGRESS_BLOCKED=true \
            -e PRODCLAW_WORKSPACE_MUTATION_DETECT=true \
            -v "$PWD:/workspace" \
            prodclaw:bypass \
            sh -lc 'curl -fsS https://denied.example.invalid'
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            echo "direct curl unexpectedly succeeded"
            exit 1
          fi

      - name: Policy Smoke Test
        run: |
          go run ./cmd/prodclaw policy check \
            --profile ci-standard \
            --action examples/actions/git-status.json

      - name: Raw CLI Examples Smoke Test
        run: |
          mkdir -p artifacts/prodclaw/examples
          ./prodclaw policy check \
            --policy-bundle examples/policies/customer-ci.yaml \
            --action examples/actions/git-status.json \
            > artifacts/prodclaw/examples/allow-git-status.json
          ./prodclaw policy explain \
            --policy-bundle examples/policies/customer-ci.yaml \
            --action examples/actions/git-push-main.json \
            > artifacts/prodclaw/examples/deny-git-push-main.json
          grep -q '"decision": "ALLOW"' artifacts/prodclaw/examples/allow-git-status.json
          grep -q '"decision": "DENY"' artifacts/prodclaw/examples/deny-git-push-main.json

          ./prodclaw job run \
            --agent codex \
            --profile ci-standard \
            --task-file examples/tasks/codex-smoke.md \
            --artifact-dir artifacts/prodclaw/examples/dry-run \
            --dry-run \
            > artifacts/prodclaw/examples/dry-run-output.json
          ./prodclaw replay --artifact-dir artifacts/prodclaw/examples/dry-run > artifacts/prodclaw/examples/dry-run-replay.txt
          grep -q 'Valid: true' artifacts/prodclaw/examples/dry-run-replay.txt

          ./prodclaw job run \
            --config examples/config/layered-policy.json \
            --artifact-dir artifacts/prodclaw/examples/layered-dry-run \
            --dry-run \
            > artifacts/prodclaw/examples/layered-dry-run-output.json
          ./prodclaw replay --artifact-dir artifacts/prodclaw/examples/layered-dry-run > artifacts/prodclaw/examples/layered-dry-run-replay.txt
          grep -q 'Valid: true' artifacts/prodclaw/examples/layered-dry-run-replay.txt

      - name: Upload Raw CLI Example Artifacts
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: prodclaw-raw-cli-example-artifacts
          path: artifacts/prodclaw/examples/
          retention-days: 7
          if-no-files-found: ignore

      - name: Clean CI CLI Smoke Test
        run: |
          printf 'fix the build\n' > /tmp/prodclaw-task.md
          env -i PATH="$PATH" HOME="$HOME" ./prodclaw version
          env -i PATH="$PATH" HOME="$HOME" ./prodclaw profiles list
          env -i PATH="$PATH" HOME="$HOME" ./prodclaw job run \
            --agent codex \
            --task-file /tmp/prodclaw-task.md \
            --dry-run

  release-dry-run:
    name: Release Dry Run
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Go
        uses: actions/setup-go@v6.3.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Dry-run release build
        shell: bash
        run: |
          set -euo pipefail
          go run ./scripts/release \
            --mode build \
            --version v0.0.0-dry-run \
            --dist dist
          printf '{"spdxVersion":"SPDX-2.3","name":"local-placeholder"}\n' > dist/prodclaw-sbom.spdx.json
          go run ./scripts/release \
            --mode provenance \
            --version v0.0.0-dry-run \
            --dist dist \
            --repository "${{ github.repository }}" \
            --workflow ".github/workflows/release.yml" \
            --run-id "${{ github.run_id }}" \
            --go-version "${GO_VERSION}"
          required=(
            prodclaw-linux-amd64.tar.gz
            prodclaw-linux-arm64.tar.gz
            prodclaw-darwin-amd64.tar.gz
            prodclaw-darwin-arm64.tar.gz
            prodclaw-windows-amd64.zip
            prodclaw-windows-arm64.zip
            prodclaw-checksums.txt
            prodclaw-sbom.spdx.json
            prodclaw-provenance.intoto.jsonl
          )
          for asset in "${required[@]}"; do
            test -s "dist/${asset}"
          done
